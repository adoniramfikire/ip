<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pb5fIop62f/iwC9z4siW8VdkQ6K4BkG1+WkzzdJ/nkFN+R4Ai/i8kKzzTKP36epFTnK0vQ9zKPR5fW0lT6a5+w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <nav>
    <div class="nav-logo">A · F</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="work.html">Work</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section id="contact">
    <h2 class="reveal">Let's <em>connect.</em></h2>
    <p class="reveal">Open to projects, collaborations &amp; conversations.</p>
    <div class="contact-links reveal">
      <a class="contact-btn" href="mailto:adoniramfikireadoniram@gmail.com">
        <span class="contact-icon"><i class="fas fa-envelope"></i></span>
        Email Me
      </a>
      <a class="contact-btn" href="https://t.me/adoniram77" target="_blank">
        <span class="contact-icon"><i class="fab fa-telegram-plane"></i></span>
        Telegram
      </a>
      <a class="contact-btn" href="https://www.instagram.com/adoniram77" target="_blank">
        <span class="contact-icon"><i class="fab fa-instagram"></i></span>
        Instagram
      </a>
      <a class="contact-btn" href="https://www.tiktok.com/@adoniram77" target="_blank">
        <span class="contact-icon"><i class="fab fa-tiktok"></i></span>
        TikTok
      </a>
      <a class="contact-btn" href="https://github.com" target="_blank">
        <span class="contact-icon"><i class="fab fa-github"></i></span>
        GitHub
      </a>
    </div>

    <form class="contact-form reveal" action="mailto:adoniramfikireadoniram@gmail.com" method="post" enctype="text/plain">
      <label>
        <span>Name</span>
        <input type="text" name="name" placeholder="Your name" required>
      </label>
      <label>
        <span>Email</span>
        <input type="email" name="email" placeholder="Your email" required>
      </label>
      <label>
        <span>Message</span>
        <textarea name="message" rows="6" placeholder="Write your message here..." required></textarea>
      </label>
      <button type="submit" class="contact-submit">Send Message</button>
    </form>
  </section>

  <footer>
    <span>© 2024 Adoniram Fkre</span>
    <span>Designed &amp; Built with care</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
